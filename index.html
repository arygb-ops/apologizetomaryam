<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Məryəm ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-light: #fff0f3;
    --pink-mid: #ffd6e0;
    --pink-deep: #ffafc7;
    --rose: #e8436e;
    --rose-dark: #c2254f;
    --cream: #fff8f9;
    --text-main: #3d1a26;
    --text-soft: #8b4560;
    --shadow: 0 8px 32px rgba(220, 60, 100, 0.18);
    --shadow-btn: 0 4px 18px rgba(220, 60, 100, 0.28);
  }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(135deg, #ffe4ec 0%, #ffc2d4 40%, #ffb3c6 70%, #ffd6e4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255,182,193,0.45) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,105,135,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 60% 10%, rgba(255,255,255,0.35) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 32px;
    box-shadow: var(--shadow), 0 2px 0 rgba(255,255,255,0.9) inset;
    padding: 44px 36px 40px;
    max-width: 420px;
    width: 92vw;
    text-align: center;
    animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(40px) scale(0.93); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .dedication {
    display: inline-block;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose);
    background: rgba(232,67,110,0.09);
    border: 1px solid rgba(232,67,110,0.22);
    border-radius: 100px;
    padding: 5px 16px;
    margin-bottom: 24px;
    animation: fadeSlideDown 0.6s 0.2s both;
  }

  .cat-wrap {
    margin: 0 auto 22px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg,#ffd6e4,#ffafc7);
    box-shadow:
      0 0 0 4px rgba(255,255,255,0.92),
      0 0 0 7px rgba(255,182,200,0.45),
      0 8px 28px rgba(220,60,100,0.28);
    display: flex; align-items: center; justify-content: center;
    animation: floatBob 3.2s ease-in-out infinite, fadeSlideDown 0.7s 0.3s both, softPulse 3.2s ease-in-out infinite;
    overflow: hidden;
    position: relative;
  }

  @keyframes softPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(255,255,255,0.92), 0 0 0 7px rgba(255,182,200,0.45), 0 8px 28px rgba(220,60,100,0.28); }
    50%     { box-shadow: 0 0 0 4px rgba(255,255,255,0.92), 0 0 0 10px rgba(232,67,110,0.28), 0 8px 36px rgba(220,60,100,0.42); }
  }

  .cat-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 65% center;
    border-radius: 50%;
    display: block;
    transform: scale(1.15);
    transform-origin: center;
    transition: transform 0.6s ease;
  }

  .cat-wrap:hover img {
    transform: scale(1.18);
    transform-origin: center;
  }

  @keyframes floatBob {
    0%,100% { transform:translateY(0); }
    50%     { transform:translateY(-8px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.45rem,5vw,1.9rem);
    font-weight: 700;
    color: var(--text-main);
    line-height: 1.28;
    margin-bottom: 10px;
    animation: fadeSlideDown 0.7s 0.4s both;
  }

  .subtitle {
    font-size: 0.88rem;
    color: var(--text-soft);
    font-style: italic;
    margin-bottom: 32px;
    animation: fadeSlideDown 0.7s 0.5s both;
  }

  /* === BUTTONS AREA === */
  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    min-height: 72px;
    animation: fadeSlideDown 0.7s 0.6s both;
  }

  .btn {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 1.05rem;
    border: none;
    border-radius: 50px;
    padding: 14px 30px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
    letter-spacing: 0.02em;
    transition:
      transform   0.38s cubic-bezier(0.34,1.56,0.64,1),
      box-shadow  0.38s ease,
      font-size   0.38s ease,
      padding     0.38s ease,
      opacity     0.38s ease,
      filter      0.38s ease,
      background  0.3s  ease;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.22);
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: inherit;
  }
  .btn:active::after { opacity: 1; }

  /* YES */
  .btn-yes {
    background: linear-gradient(135deg,#e8436e,#c2254f);
    color: #fff;
    box-shadow: var(--shadow-btn);
    transform-origin: center;
  }
  .btn-yes:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 8px 28px rgba(220,60,100,0.38); }

  .btn-yes.glowing {
    animation: yesGlow 1.8s ease-in-out infinite;
  }
  @keyframes yesGlow {
    0%,100% { box-shadow: 0 4px 18px rgba(220,60,100,0.28), 0 0 0 0px rgba(232,67,110,0); }
    50%     { box-shadow: 0 8px 32px rgba(220,60,100,0.55), 0 0 28px 8px rgba(232,67,110,0.38); }
  }

  /* NO */
  .btn-no {
    background: rgba(255,255,255,0.82);
    color: var(--text-soft);
    border: 1.5px solid var(--pink-deep);
    box-shadow: 0 3px 12px rgba(220,60,100,0.1);
    transform-origin: center;
    will-change: transform, opacity;
  }
  .btn-no:hover { background:#fff0f3; box-shadow:0 4px 16px rgba(220,60,100,0.18); }

  @keyframes shakeShrink {
    0%   { transform: scale(var(--ns,1)) rotate(0deg); }
    18%  { transform: scale(var(--ns,1)) rotate(-9deg); }
    36%  { transform: scale(var(--ns,1)) rotate( 9deg); }
    54%  { transform: scale(var(--ns,1)) rotate(-6deg); }
    72%  { transform: scale(var(--ns,1)) rotate( 4deg); }
    90%  { transform: scale(var(--ns,1)) rotate(-2deg); }
    100% { transform: scale(var(--ns,1)) rotate( 0deg); }
  }

  .btn-no.shaking {
    animation: shakeShrink 0.42s ease both;
  }

  /* SHARED */
  @keyframes fadeSlideDown {
    from { opacity:0; transform:translateY(-14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* === YES PAGE === */
  #yes-page {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: linear-gradient(145deg,#ffe4ec,#ffc2d4 50%,#ffb3c6);
    align-items: center;
    justify-content: center;
    animation: pageFade 1s ease both;
    flex-direction: column;
    overflow: hidden;
  }
  #yes-page.show { display:flex; }

  @keyframes pageFade { from{opacity:0;} to{opacity:1;} }

  .yes-card {
    background: rgba(255,255,255,0.76);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius: 28px;
    box-shadow: 0 12px 48px rgba(220,60,100,0.22);
    padding: 44px 36px;
    max-width: 420px;
    width: 88vw;
    text-align: center;
    animation: cardIn 0.9s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative;
    z-index: 2;
  }

  .yes-emoji {
    font-size: 3.2rem;
    margin-bottom: 18px;
    display: block;
    animation: popIn 0.6s 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.4);} to{opacity:1;transform:scale(1);} }

  .yes-message {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem,4vw,1.15rem);
    color: var(--text-main);
    line-height: 1.85;
    white-space: pre-line;
    animation: fadeSlideDown 0.8s 1s both;
  }

  .yes-sig {
    margin-top: 22px;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-style: italic;
    color: var(--rose);
    font-size: 1rem;
    animation: fadeSlideDown 0.8s 1.2s both;
  }

  /* HEARTS */
  .hearts-layer { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
  .heart { position:absolute; bottom:-60px; font-size:1.4rem; opacity:0; animation:floatUp linear infinite; }
  @keyframes floatUp {
    0%   { opacity:0;   transform:translateY(0) rotate(0deg) scale(0.7); }
    10%  { opacity:0.9; }
    90%  { opacity:0.7; }
    100% { opacity:0;   transform:translateY(-110vh) rotate(30deg) scale(1.1); }
  }

  /* MUSIC */
  .music-hint { font-size:0.72rem; color:var(--text-soft); margin-top:18px; opacity:0.65; animation:fadeSlideDown 0.7s 0.7s both; }
  .music-hint span { cursor:pointer; text-decoration:underline; }

  @media(max-width:400px) {
    .card { padding:32px 20px 30px; }
    .yes-card { padding:32px 20px; }
  }
</style>
</head>
<body>

<div class="hearts-layer" id="hearts-layer"></div>

<div class="card" id="main-card">
  <div class="dedication">For Məryəm ❤️</div>

  <div class="cat-wrap">
    <img src="p_1.jpg" alt="my love" />
  </div>

  <h1>Will you forgive me,<br>my love? 🥺</h1>
  <p class="subtitle">I promise it's worth it…</p>

  <div class="buttons">
    <button class="btn btn-yes" id="btn-yes" onclick="handleYes()">Yes ❤️</button>
    <button class="btn btn-no" id="btn-no" onclick="handleNo()">No 😢</button>
  </div>

  <p class="music-hint">🎵 <span onclick="toggleMusic()">Tap to play soft music</span></p>
</div>

<div id="yes-page">
  <div class="yes-card">
    <span class="yes-emoji">😍✅</span>
    <div class="yes-message" id="yes-message"></div>
    <div class="yes-sig">Always yours, Arif ❤️</div>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" type="audio/mpeg">
</audio>

<script>
  const MESSAGE =
`Yesss 😍 Mission completed ✅

Məryəm, sən mənim üçün hər şeydən önəmlisən.
Həyatın mənə verdiyi ən dəyərli hədiyyəsən, mənim hər şeyimsən.

Səni incitmək və ya kefini qaçırmaq heç vaxt istəmərəm.
Belə qalmağına da icazə verə bilmərəm.

İndi yanına gələ bilmirəm, amma görüşəndə səni çoxlu öpəcəm ❤️

İndi tədbirə odaklan həzz al.`;

  /* ── constants ── */
  const NO_SHRINK_STEP  = 0.12;
  const NO_SCALE_MIN    = 0.30;
  const YES_GROW_STEP   = 0.07;   // rem added to font-size each click
  const YES_PAD_STEP    = 2;      // px added to each padding side

  /* ── state ── */
  let noCount   = 0;
  let noScale   = 1.0;
  let yesFontSz = 1.05;   // rem
  let yesPadV   = 14;     // px
  let yesPadH   = 30;     // px

  const btnYes = document.getElementById('btn-yes');
  const btnNo  = document.getElementById('btn-no');
  const audio  = document.getElementById('bg-music');
  let musicOn  = false;

  const taunts = ['No 😢','Nope 🙈','Never 😅','Really? 😬','Hmm… 😏','Tiny… 🤏','🥺','🥺'];

  /* ── dynamic glow style element ── */
  const glowStyle = document.createElement('style');
  document.head.appendChild(glowStyle);

  function updateGlow(clicks) {
    const spread = Math.min(10 + clicks * 5, 44);
    const alpha  = Math.min(0.30 + clicks * 0.07, 0.75).toFixed(2);
    glowStyle.textContent = `
      @keyframes yesGlow {
        0%,100% { box-shadow: 0 4px 18px rgba(220,60,100,0.28), 0 0 0 0 rgba(232,67,110,0); }
        50%     { box-shadow: 0 8px 36px rgba(220,60,100,0.6),  0 0 ${spread}px ${Math.round(spread/3)}px rgba(232,67,110,${alpha}); }
      }`;
  }

  /* ── No handler ── */
  function handleNo() {
    noCount++;

    /* 1. Shrink the No button */
    noScale = Math.max(noScale - NO_SHRINK_STEP, NO_SCALE_MIN);
    btnNo.style.setProperty('--ns', noScale);

    /* Apply scale — transition handles smoothness */
    btnNo.style.transform = `scale(${noScale})`;
    btnNo.style.opacity   = Math.max(0.45, noScale + 0.1).toFixed(2);

    /* Shrink font & padding so text doesn't overflow the scaled element */
    const f = Math.max(noScale, NO_SCALE_MIN);
    btnNo.style.fontSize = `${Math.max(0.55, 1.05 * f).toFixed(2)}rem`;
    btnNo.style.padding  = `${Math.max(5, Math.round(14 * f))}px ${Math.max(8, Math.round(30 * f))}px`;

    /* 2. Shake */
    btnNo.classList.remove('shaking');
    void btnNo.offsetWidth;              /* reflow to restart animation */
    btnNo.classList.add('shaking');
    btnNo.addEventListener('animationend', () => btnNo.classList.remove('shaking'), { once: true });

    /* 3. Taunt label */
    btnNo.textContent = taunts[Math.min(noCount - 1, taunts.length - 1)];

    /* 4. Grow Yes button */
    yesFontSz = Math.min(yesFontSz + YES_GROW_STEP, 1.95);
    yesPadV   = Math.min(yesPadV   + YES_PAD_STEP,  34);
    yesPadH   = Math.min(yesPadH   + YES_PAD_STEP * 2.5, 72);

    btnYes.style.fontSize = `${yesFontSz.toFixed(2)}rem`;
    btnYes.style.padding  = `${yesPadV}px ${yesPadH}px`;

    /* 5. Glow (intensifies) */
    btnYes.classList.add('glowing');
    updateGlow(noCount);
  }

  /* ── Yes handler ── */
  function handleYes() {
    document.getElementById('yes-message').textContent = MESSAGE;
    document.getElementById('yes-page').classList.add('show');
    spawnHearts();
    audio.volume = 0.35;
    audio.play().catch(() => {});
    musicOn = true;
  }

  /* ── Hearts ── */
  function spawnHearts() {
    const layer  = document.getElementById('hearts-layer');
    const emojis = ['❤️','💕','💖','💗','💓','🌹','✨','💝'];
    for (let i = 0; i < 28; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left              = Math.random() * 100 + 'vw';
      h.style.fontSize          = (0.9 + Math.random() * 1.6) + 'rem';
      h.style.animationDuration = (5 + Math.random() * 8) + 's';
      h.style.animationDelay   = (Math.random() * 6) + 's';
      layer.appendChild(h);
    }
  }

  /* ── Music toggle ── */
  function toggleMusic() {
    if (musicOn) { audio.pause(); musicOn = false; }
    else { audio.volume = 0.35; audio.play().catch(() => {}); musicOn = true; }
  }
</script>
</body>
</html>
